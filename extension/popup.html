<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Timestamp Overlay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #303134;
      color: #e8eaed;
      font-family: Roboto, Arial, sans-serif;
      font-size: 13px;
      width: 240px;
      padding: 12px;
    }
    h3 {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 12px;
      color: #e8eaed;
    }
    button {
      display: block;
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: Roboto, Arial, sans-serif;
      cursor: pointer;
      border: 1px solid #5f6368;
      background: #202124;
      color: #e8eaed;
    }
    button:hover { background: #3c4043; }
    #resetBtn { color: #8ab4f8; border-color: #8ab4f8; }
    label { font-size: 11px; color: #9aa0a6; display: block; margin-bottom: 4px; margin-top: 8px; }
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      background: #202124;
      border: 1px solid #5f6368;
      border-radius: 4px;
      color: #e8eaed;
      font-size: 12px;
      font-family: monospace;
    }
    input[type="text"]:focus { outline: none; border-color: #8ab4f8; }
    #status { font-size: 11px; color: #34a853; margin-top: 8px; min-height: 16px; }
  </style>
</head>
<body>
  <h3>⏱ Timestamp Overlay</h3>

  <label>Current Timestamp</label>
  <input type="text" id="tsInput" placeholder="YYYY-MM-DD HH:mm:ss UTC" />

  <button id="resetBtn">↺ Reset to Current UTC</button>
  <button id="saveBtn">✓ Save Timestamp</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
